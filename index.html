<!DOCTYPE html>
<html>
    <head>
        <title> Chat Bot Test</title>
        <link rel="stylesheet" href="Css/main.css">
        <link rel="stylesheet" href="Css/form.css">
    </head>
    <body>
        <form id="signupForm" class="active-form">
            <h1>SIGN UP</h1>
            <div class="tab-buttons">
                <button type="button">Sign Up</button><button type="button">Log In</button>
            </div>
            <input type="text" id="signin-username" placeholder="Username" required>
            <input type="password" id="signin-password" placeholder="Password" required>
            <input type="gmail" id="signin-gmail" placeholder="gmail" required>
            <input type="number" id="signin-age" placeholder="age" required>
            <button type="button" id="signup-btn" class="Submit">Signup</button>
        </form>

        <form id="loginForm" class="hidden-form">
            <h1>LOG IN</h1>
            <div class="tab-buttons">
                <button type="button">Sign Up</button><button type="button">Log In</button>
            </div>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn" type="button" class="Submit">Login</button>
        </form>

        <div class="left-bar">

        </div>
        <script src="js/forms.js"></script>
    </body>
</html>
